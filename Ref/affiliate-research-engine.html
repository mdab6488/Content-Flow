<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Affiliate Research Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b1120;--surface:#111827;--surface2:#1e293b;
  --border:#1e3a5f;--border2:#2563eb33;
  --cyan:#0891b2;--cyan-dim:#0e7490;--cyan-bg:#0891b220;
  --green:#10b981;--green-bg:#10b98120;
  --amber:#f59e0b;--amber-bg:#f59e0b20;
  --red:#ef4444;--red-bg:#ef444420;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --font:'Atkinson Hyperlegible',sans-serif;--mono:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:20px;}
.app{max-width:960px;margin:0 auto;}

/* Header */
.header{margin-bottom:28px;}
.header h1{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:6px;}
.header p{font-size:14px;color:var(--text2);line-height:1.6;}
.stage-pill{display:inline-block;background:var(--cyan-bg);border:1px solid var(--cyan);color:var(--cyan);font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:1px;margin-bottom:10px;}

/* Flow bar */
.flow-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;}
.flow-step{flex:1;padding:10px 8px;text-align:center;font-size:12px;font-weight:700;color:var(--text3);background:var(--surface);border-right:1px solid var(--border);cursor:default;transition:all .2s;letter-spacing:.3px;}
.flow-step:last-child{border-right:none;}
.flow-step.active{background:var(--cyan);color:#fff;}
.flow-step.done{background:var(--green-bg);color:var(--green);}

/* Tool cards grid */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:20px;}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color .2s;}
.tool-card.has-data{border-color:var(--green);}
.tool-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tool-name{font-size:13px;font-weight:700;color:var(--text);}
.tool-status{font-size:11px;font-weight:700;}
.tool-status.ok{color:var(--green);}
.tool-status.empty{color:var(--text3);}
.tool-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--text2);resize:none;outline:none;line-height:1.5;}
.tool-ta:focus{border-color:var(--cyan);}
.tool-ta::placeholder{color:var(--text3);}
.file-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer;margin-top:6px;padding:4px 0;}
.file-btn:hover{color:var(--cyan);}
.file-inp{display:none;}

/* Config row */
.config-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.field-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
input[type=text], select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;}
input[type=text]:focus, select:focus{border-color:var(--cyan);}
input[type=text]::placeholder{color:var(--text3);}
select option{background:var(--surface2);}

/* Action bar */
.action-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.data-count{font-size:13px;color:var(--text2);}
.data-count strong{color:var(--cyan);}
.btn-analyze{background:var(--cyan);color:#fff;border:none;border-radius:8px;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .2s;}
.btn-analyze:hover{background:var(--cyan-dim);}
.btn-analyze:disabled{opacity:.4;cursor:not-allowed;}

/* Loading */
.loading-view{text-align:center;padding:4rem 1rem;}
.loading-icon{font-size:40px;margin-bottom:16px;}
.loading-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.loading-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.progress-log{font-family:var(--mono);font-size:12px;color:var(--cyan);text-align:left;max-width:400px;margin:0 auto;min-height:60px;}
.progress-line{padding:4px 0;opacity:0;animation:fadeIn .3s forwards;}
@keyframes fadeIn{to{opacity:1;}}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Results */
.results-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap;}
.results-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.results-sub{font-size:13px;color:var(--text2);}
.btn-reset{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-reset:hover{color:var(--text);border-color:var(--text2);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px;}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono);}
.stat-val.green{color:var(--green);}
.stat-val.cyan{color:var(--cyan);}
.stat-val.amber{color:var(--amber);}

/* Opportunity cards */
.opp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px;}
.opp-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;}
.rank-badge{min-width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text2);}
.rank-badge.r1{background:var(--amber-bg);color:var(--amber);}
.rank-badge.r2{background:var(--cyan-bg);color:var(--cyan);}
.rank-badge.r3{background:var(--green-bg);color:var(--green);}
.opp-kw{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3;}
.opp-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid;white-space:nowrap;}
.tag-neutral{background:var(--surface2);border-color:var(--border);color:var(--text2);}
.tag-green{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.tag-cyan{background:var(--cyan-bg);border-color:var(--cyan);color:var(--cyan);}
.tag-amber{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.tag-red{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.opp-rev{text-align:right;white-space:nowrap;}
.rev-label{font-size:11px;color:var(--text3);}
.rev-val{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--green);}

.score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.score-box{background:var(--surface2);border-radius:6px;padding:10px;text-align:center;}
.score-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px;}
.score-num{font-size:20px;font-weight:700;font-family:var(--mono);}

.products-section{margin-bottom:14px;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;}
.product-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.product-row:last-child{border-bottom:none;}
.product-name{font-size:13px;color:var(--text);}
.product-comm{font-size:12px;font-weight:700;color:var(--green);}
.product-prog{font-size:11px;color:var(--text3);}

.video-brief{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;}
.brief-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;}
.brief-hook{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:10px;line-height:1.5;}
.brief-outline{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.outline-step{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 8px;color:var(--text2);}
.brief-thumb{font-size:11px;color:var(--text3);}
.brief-thumb strong{color:var(--cyan);}

.why-box{margin-top:10px;padding:10px 12px;border-left:2px solid var(--cyan);background:var(--cyan-bg);border-radius:0 6px 6px 0;font-size:12px;color:var(--text2);line-height:1.6;}

.insight-banner{background:var(--surface);border:1px solid var(--amber);border-radius:8px;padding:14px 16px;margin-top:20px;font-size:13px;color:var(--text2);line-height:1.6;}
.insight-banner strong{color:var(--amber);}

/* Error */
.error-view{text-align:center;padding:3rem 1rem;}
.error-icon{font-size:36px;margin-bottom:12px;}
.error-msg{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6;}

/* Copy btn */
.btn-copy{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-copy:hover{color:var(--cyan);border-color:var(--cyan);}

.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="stage-pill">STAGE 1 — RESEARCH &amp; DISCOVERY</span>
    <h1>AI Affiliate Research Engine</h1>
    <p>Paste exports from your SEO tools below. The AI analyzes everything together, ranks the best affiliate article opportunities, extracts the products, validates YouTube viability, and builds your video briefs — automatically.</p>
  </div>
  <div class="flow-bar" id="flow-bar"></div>
  <div id="content"></div>
</div>

<script>
const STEPS = ['1. Upload Tool Data','2. AI Analysis','3. Opportunities'];
let view = 'input';
let toolData = {};
let niche = '';
let goal = 'affiliate';
let results = null;
let errMsg = null;

const TOOLS = [
  {id:'ahrefs',name:'Ahrefs',hint:'Paste: Keywords Explorer export (keyword, volume, KD, CPC)'},
  {id:'semrush',name:'SEMrush',hint:'Paste: Keyword Magic Tool or Organic Research CSV rows'},
  {id:'ubersuggest',name:'Ubersuggest',hint:'Paste: Keyword Ideas or Traffic Analyzer export'},
  {id:'vidiq',name:'VidIQ',hint:'Paste: YouTube keyword research or trending videos list'},
  {id:'similarweb',name:'SimilarWeb',hint:'Paste: Top pages or competitor traffic data'},
  {id:'answerthepublic',name:'AnswerThePublic',hint:'Paste: Questions, prepositions, comparisons data'},
  {id:'explodingtopics',name:'ExplodingTopics',hint:'Paste: Trending topics or growth data'},
  {id:'answersocrates',name:'AnswerSocrates',hint:'Paste: "People also ask" or related questions'},
  {id:'articles',name:'Competitor Articles',hint:'Paste: URLs or full content of top-ranking affiliate articles you found'},
];

function scoreColor(n){
  if(n>=8)return'var(--green)';
  if(n>=6)return'var(--amber)';
  return'var(--red)';
}

function renderFlowBar(){
  const stepIdx = view==='input'?0:view==='loading'?1:view==='results'?2:1;
  document.getElementById('flow-bar').innerHTML = STEPS.map((s,i)=>{
    const cls = i<stepIdx?'done':i===stepIdx?'active':'';
    const prefix = i<stepIdx?'✓ ':'';
    return `<div class="flow-step ${cls}">${prefix}${s}</div>`;
  }).join('');
}

function render(){
  renderFlowBar();
  const c = document.getElementById('content');
  if(view==='input') c.innerHTML = renderInput();
  else if(view==='loading') c.innerHTML = renderLoading();
  else if(view==='results') c.innerHTML = renderResults();
  else c.innerHTML = renderError();
  attachEvents();
}

function renderInput(){
  const filled = Object.values(toolData).filter(v=>v&&v.trim()).length;
  return `
  <div class="tools-grid">
    ${TOOLS.map(t=>{
      const val = toolData[t.id]||'';
      const has = val.trim().length>0;
      return `
      <div class="tool-card ${has?'has-data':''}" id="card-${t.id}">
        <div class="tool-card-header">
          <span class="tool-name">${t.name}</span>
          <span class="tool-status ${has?'ok':'empty'}">${has?'✓ Data':'Optional'}</span>
        </div>
        <textarea class="tool-ta" data-tool="${t.id}" rows="3" placeholder="${t.hint}">${val}</textarea>
        <label class="file-btn">
          ↑ Upload CSV / TXT file
          <input type="file" class="file-inp" data-tool="${t.id}" accept=".csv,.txt,.xlsx,.pdf,.xls" />
        </label>
      </div>`;
    }).join('')}
  </div>

  <hr class="divider">

  <div class="config-row">
    <div>
      <span class="field-label">Niche / Topic Focus</span>
      <input type="text" id="niche-inp" placeholder="e.g. Home fitness equipment, AI writing tools, Kitchen gadgets..." value="${niche}" />
    </div>
    <div>
      <span class="field-label">Primary Goal</span>
      <select id="goal-sel">
        <option value="affiliate" ${goal==='affiliate'?'selected':''}>Maximize affiliate commissions</option>
        <option value="views" ${goal==='views'?'selected':''}>Maximize YouTube views first</option>
        <option value="both" ${goal==='both'?'selected':''}>Balance views + commissions</option>
      </select>
    </div>
  </div>

  <div class="action-bar">
    <div class="data-count">
      <strong>${filled}</strong> tool${filled!==1?'s':''} loaded${niche?` · Niche: <strong>${niche}</strong>`:''}
      ${filled===0?'<br><span style="font-size:12px;color:var(--text3);">Paste data above, or click Analyze for AI-suggested opportunities</span>':''}
    </div>
    <button class="btn-analyze" onclick="startAnalysis()">
      ⚡ Analyze with AI
    </button>
  </div>`;
}

const LOG_MSGS = [
  '> Parsing SEO tool exports...',
  '> Scanning for commercial-intent keywords...',
  '> Identifying affiliate product categories...',
  '> Scoring YouTube viability...',
  '> Estimating commission potential...',
  '> Building video briefs...',
  '> Ranking final opportunities...'
];

function renderLoading(){
  return `
  <div class="loading-view">
    <div class="spinner" style="margin:0 auto 20px;"></div>
    <div class="loading-title">Claude is analyzing your data</div>
    <div class="loading-sub">Identifying top affiliate opportunities, scoring YouTube potential,<br>extracting products, and building video briefs.</div>
    <div class="progress-log" id="plog"></div>
  </div>`;
}

function startProgressLog(){
  let i=0;
  const el = document.getElementById('plog');
  if(!el)return;
  const add = ()=>{
    if(!document.getElementById('plog'))return;
    if(i<LOG_MSGS.length){
      const d=document.createElement('div');
      d.className='progress-line';
      d.textContent=LOG_MSGS[i++];
      el.appendChild(d);
      setTimeout(add,1600);
    }
  };
  setTimeout(add,400);
}

function renderResults(){
  if(!results||!results.opportunities)return renderError('Could not parse AI response. Please try again.');
  const ops = results.opportunities;

  return `
  <div class="results-header">
    <div>
      <div class="results-title">🎯 ${ops.length} High-Potential Opportunities Found</div>
      <div class="results-sub">${results.market_insight||'Ranked by affiliate commission potential + YouTube viability.'}</div>
    </div>
    <button class="btn-reset" onclick="goBack()">← New Analysis</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Combined Monthly Potential</div>
      <div class="stat-val green">${results.total_monthly_potential||'See below'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Videos to Create</div>
      <div class="stat-val cyan">${ops.length} Videos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Start With</div>
      <div class="stat-val amber" style="font-size:13px;font-family:var(--font);line-height:1.4;">${results.start_with?results.start_with.substring(0,70)+(results.start_with.length>70?'...':''):'Priority #1 below'}</div>
    </div>
  </div>

  ${ops.map((op,idx)=>renderOppCard(op,idx)).join('')}

  ${results.market_insight?`<div class="insight-banner"><strong>Market Insight:</strong> ${results.market_insight}</div>`:''}
  `;
}

function renderOppCard(op,idx){
  const compTag = op.competition_level==='Low'?'tag-green':op.competition_level==='High'?'tag-red':'tag-amber';
  const rBadge = idx===0?'r1':idx===1?'r2':idx===2?'r3':'';
  const prods = op.affiliate_products||[];
  const outline = op.video_outline||[];

  return `
  <div class="opp-card">
    <div class="opp-top">
      <div class="rank-badge ${rBadge}">#${op.rank||idx+1}</div>
      <div style="flex:1;">
        <div class="opp-kw">${op.keyword}</div>
        <div class="opp-tags">
          ${op.monthly_search_volume?`<span class="tag tag-neutral">${op.monthly_search_volume}</span>`:''}
          ${op.competition_level?`<span class="tag ${compTag}">${op.competition_level} Competition</span>`:''}
          ${op.estimated_cpc?`<span class="tag tag-neutral">CPC ${op.estimated_cpc}</span>`:''}
          ${op.search_intent?`<span class="tag tag-cyan">${op.search_intent}</span>`:''}
          ${op.source_tool&&op.source_tool!=='AI suggestion'?`<span class="tag tag-neutral">via ${op.source_tool}</span>`:''}
        </div>
      </div>
      <div class="opp-rev">
        <div class="rev-label">Est. monthly</div>
        <div class="rev-val">${op.monthly_revenue_potential||'N/A'}</div>
      </div>
    </div>

    <div class="score-row">
      <div class="score-box">
        <div class="score-name">Affiliate Score</div>
        <div class="score-num" style="color:${scoreColor(op.affiliate_score||0)};">${op.affiliate_score||'—'}</div>
      </div>
      <div class="score-box">
        <div class="score-name">YouTube Score</div>
        <div class="score-num" style="color:${scoreColor(op.youtube_score||0)};">${op.youtube_score||'—'}</div>
      </div>
      <div class="score-box">
        <div class="score-name">Overall Score</div>
        <div class="score-num" style="color:${scoreColor(op.overall_score||0)};">${op.overall_score||'—'}</div>
      </div>
    </div>

    ${prods.length>0?`
    <div class="products-section">
      <div class="section-label">Affiliate Products to Feature</div>
      ${prods.map(p=>`
        <div class="product-row">
          <span class="product-name">${typeof p==='object'?p.name:p}</span>
          <div style="display:flex;align-items:center;gap:10px;">
            ${typeof p==='object'&&p.program?`<span class="product-prog">${p.program}</span>`:''}
            ${typeof p==='object'&&p.estimated_commission?`<span class="product-comm">${p.estimated_commission}</span>`:''}
          </div>
        </div>
      `).join('')}
    </div>`:''}

    <div class="video-brief">
      <div class="section-label">Video Brief</div>
      <div class="brief-title">${op.video_title||op.keyword}</div>
      ${op.video_hook?`<div class="brief-hook">"${op.video_hook}"</div>`:''}
      ${outline.length>0?`
      <div class="brief-outline">
        ${outline.map((s,i)=>`<span class="outline-step">${i+1}. ${s}</span>`).join('')}
      </div>`:''}
      ${op.thumbnail_concept?`<div class="brief-thumb"><strong>Thumbnail:</strong> ${op.thumbnail_concept}</div>`:''}
    </div>

    ${op.why_this_wins?`<div class="why-box">${op.why_this_wins}</div>`:''}
  </div>`;
}

function renderError(){
  return `
  <div class="error-view">
    <div class="error-icon">⚠️</div>
    <div class="error-msg">${errMsg||'Something went wrong. Check your connection and try again.'}</div>
    <button class="btn-analyze" onclick="goBack()">← Try Again</button>
  </div>`;
}

function attachEvents(){
  document.querySelectorAll('.tool-ta').forEach(ta=>{
    ta.addEventListener('input',()=>{ toolData[ta.dataset.tool]=ta.value; syncCardState(ta.dataset.tool); });
  });
  document.querySelectorAll('.file-inp').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const f=e.target.files[0]; if(!f)return;
      try{
        const text=await readFile(f);
        const tid=inp.dataset.tool;
        toolData[tid]=(toolData[tid]||'')+'\n'+text;
        render();
      }catch(err){alert('Could not read file: '+err.message);}
    });
  });
  const ni=document.getElementById('niche-inp');
  if(ni)ni.addEventListener('input',()=>{niche=ni.value;});
  const gs=document.getElementById('goal-sel');
  if(gs)gs.addEventListener('change',()=>{goal=gs.value;});
}

function syncCardState(toolId){
  const card=document.getElementById('card-'+toolId); if(!card)return;
  const has=toolData[toolId]&&toolData[toolId].trim().length>0;
  card.classList.toggle('has-data',has);
  const st=card.querySelector('.tool-status');
  if(st){st.textContent=has?'✓ Data':'Optional';st.className='tool-status '+(has?'ok':'empty');}
}

function readFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=()=>rej(new Error('File read failed'));
    r.readAsText(file);
  });
}

async function startAnalysis(){
  view='loading'; render(); startProgressLog();
  const toolText=Object.entries(toolData).filter(([,v])=>v&&v.trim()).map(([k,v])=>`\n=== ${k.toUpperCase()} DATA ===\n${v.substring(0,3000)}`).join('\n');
  const hasData=toolText.length>0;
  const userMsg=hasData
    ?`Analyze this SEO tool data and identify top affiliate YouTube opportunities.\n\nNiche focus: ${niche||'detect from the data'}\nGoal: ${goal}\n\nSEO TOOL DATA:${toolText}`
    :`Suggest the top 5 affiliate YouTube video opportunities.\nNiche: ${niche||'general consumer products'}\nGoal: ${goal}\nUse your knowledge of what performs well for affiliate YouTube channels in 2025.`;

  const SYSTEM=`You are an expert affiliate marketing researcher and YouTube content strategist.

Your job: analyze SEO data to find the TOP 5 affiliate keyword opportunities that make high-converting YouTube videos.

PRIORITIZE keywords with:
- "best X", "X review", "X vs Y", "top X for Y" = buyer intent
- Products available on Amazon or with affiliate programs
- YouTube competition lower than Google = opportunity gap
- Price point where commissions are meaningful ($30+ products)

Return ONLY raw valid JSON (no markdown, no backticks, just JSON):
{
  "opportunities": [
    {
      "rank": 1,
      "keyword": "exact keyword phrase",
      "source_tool": "ahrefs or semrush or AI suggestion etc",
      "search_intent": "Commercial|Transactional|Informational",
      "affiliate_score": 8.5,
      "youtube_score": 7.8,
      "overall_score": 8.2,
      "monthly_search_volume": "8,200/mo",
      "competition_level": "Low|Medium|High",
      "estimated_cpc": "$2.40",
      "affiliate_products": [
        { "name": "Product Name", "estimated_commission": "$15-45/sale", "program": "Amazon Associates" }
      ],
      "monthly_revenue_potential": "$300-$900",
      "video_title": "YouTube-optimized title with number and year",
      "video_hook": "First 15 seconds opening line to hook viewers",
      "video_outline": ["Hook + problem", "What I tested", "Top picks breakdown", "Budget pick", "Final verdict + links"],
      "thumbnail_concept": "What to show visually on thumbnail",
      "why_this_wins": "2-3 sentences explaining why this is a high-potential opportunity right now"
    }
  ],
  "market_insight": "Key insight about this niche and why now is a good time",
  "total_monthly_potential": "$X,XXX-$X,XXX combined across all 5 videos/month",
  "start_with": "Start with #1 because [specific reason]"
}`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        system:SYSTEM,
        messages:[{role:'user',content:userMsg}]
      })
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||'API error '+resp.status);}
    const data=await resp.json();
    let raw=data.content.map(b=>b.text||'').join('').trim();
    if(raw.startsWith('```')){raw=raw.replace(/^```[a-z]*\n?/,'').replace(/\n?```$/,'');}
    results=JSON.parse(raw);
    view='results';
  }catch(e){
    errMsg=e.message;
    view='error';
  }
  render();
}

function goBack(){view='input';results=null;errMsg=null;render();}

render();
</script>
